# Professional Financial Dashboard Theme (Dark)
[theme]
base = "dark"
primaryColor = "#60A5FA"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
linkColor = "#60A5FA"
borderColor = "#334155"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "medium"
buttonRadius = "medium"
font = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap"
baseFontSize = 14
headingFontSizes = ["28px", "22px", "18px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false
greenColor = "#34D399"
redColor = "#F87171"
blueColor = "#60A5FA"
grayColor = "#94A3B8"
chartCategoricalColors = ["#60A5FA", "#34D399", "#A78BFA", "#F87171", "#FBBF24", "#38BDF8"]
dataframeBorderColor = "#334155"
dataframeHeaderBackgroundColor = "#1E293B"

[theme.sidebar]
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
borderColor = "#334155"
primaryColor = "#60A5FA"
